{% extends "base.html" %}{% block content %}
<div class="container-fluid mt-4"><nav aria-label="breadcrumb"><ol class="breadcrumb"><li class="breadcrumb-item"><a href="{% url 'actividades:actividad_list' %}">Actividades</a></li><li class="breadcrumb-item active">{{ title }}</li></ol></nav>
<div class="row justify-content-center"><div class="col-md-8"><div class="card shadow-sm"><div class="card-header"><h5 class="mb-0 fw-bold">{{ title }}</h5></div><div class="card-body"><form method="POST">{% csrf_token %}{% for field in form %}<div class="mb-3"><label class="form-label small fw-semibold">{{ field.label }}</label>{{ field }}</div>{% endfor %}<button type="submit" class="btn btn-primary"><i class="bi bi-save"></i> Guardar</button><a href="{% url 'actividades:actividad_list' %}" class="btn btn-outline-secondary">Cancelar</a></form></div></div></div></div></div>{% endblock %}
