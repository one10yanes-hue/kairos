{% extends "base.html" %}{% load static %}
{% block extra_css %}<link href="{% static 'css/reportes.css' %}" rel="stylesheet">{% endblock %}
{% block content %}
<div class="container-fluid mt-3">
    <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
        <h5 class="fw-bold mb-0"><i class="bi bi-file-earmark-spreadsheet" style="color:var(--accent);font-size:1.2rem;"></i> Reportes</h5>
    </div>

    <div class="card shadow-sm">
        <div class="card-header py-2 px-3"><small class="fw-semibold"><i class="bi bi-download"></i> Exportar Reporte</small></div>
        <div class="card-body p-3">
            <form method="GET" action="{% url 'reportes:exportar_completo' %}">
                <div class="row g-2 mb-2">
                    <div class="col-md-4">
                        <input type="text" name="q" class="form-control form-control-sm" placeholder="Buscar actividad o usuario..." style="font-size:0.78rem;">
                    </div>
                    <div class="col-md-4">
                        <select name="empresa" class="form-select form-select-sm" style="font-size:0.78rem;">
                            <option value="">Todas las empresas</option>
                            {% for e in empresas %}<option value="{{ e }}">{{ e }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <select name="area" class="form-select form-select-sm" style="font-size:0.78rem;">
                            <option value="">Todas las areas</option>
                            {% for a in areas %}<option value="{{ a.pk }}">{{ a.nombre }}</option>{% endfor %}
                        </select>
                    </div>
                </div>
                <div class="row g-2 mb-3">
                    <div class="col-md-3">
                        <select name="subarea" class="form-select form-select-sm" style="font-size:0.78rem;">
                            <option value="">Todas las subareas</option>
                            {% for s in subareas %}<option value="{{ s.pk }}">{{ s.nombre }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-3">
                        <select name="user" class="form-select form-select-sm" style="font-size:0.78rem;">
                            <option value="">Todos los usuarios</option>
                            {% for u in users %}<option value="{{ u.pk }}">{{ u.get_full_name }}</option>{% endfor %}
                        </select>
                    </div>
                    <div class="col-md-2">
                        <select name="estado" class="form-select form-select-sm" style="font-size:0.78rem;">
                            <option value="">Todos los estados</option>
                            <option value="Pendiente">Pendiente</option>
                            <option value="EnCurso">En Curso</option>
                            <option value="Pausada">Pausada</option>
                            <option value="Finalizada">Finalizada</option>
                            <option value="Cancelada">Cancelada</option>
                            <option value="Trasladada">Trasladada</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <input type="date" name="fecha_desde" class="form-control form-control-sm" style="font-size:0.78rem;" title="Desde">
                    </div>
                    <div class="col-md-2">
                        <input type="date" name="fecha_hasta" class="form-control form-control-sm" style="font-size:0.78rem;" title="Hasta">
                    </div>
                </div>
                <div class="d-flex justify-content-end gap-2">
                    <button type="submit" class="btn btn-sm btn-success px-4" style="font-size:0.78rem;"><i class="bi bi-download"></i> Exportar Excel</button>
                </div>
            </form>
        </div>
    </div>
</div>{% endblock %}
