{% extends "base.html" %}
{% load static %}

{% block content_auth %}
<div class="min-vh-100 d-flex align-items-center justify-content-center" style="background:linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 50%, #f8fafc 100%);">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="text-center mb-4">
                    <img src="{% static 'img/kairos_logo.png' %}" alt="KAIROS" style="width:80px;height:80px;border-radius:1rem;box-shadow:0 4px 16px rgba(59,130,246,0.15);">
                    <h3 class="fw-bold mt-3 mb-0" style="font-family:'Nunito',sans-serif;font-weight:900;letter-spacing:1px;color:var(--slate-800);">KAIROS</h3>
                </div>
                <div class="card shadow-sm" style="border-radius:1rem;border:1px solid var(--slate-200);">
                    <div class="card-body p-4">
                        {% if messages %}
                        <div class="mb-3">
                            {% for m in messages %}
                            <div class="alert alert-danger py-2 px-3 small" style="border-radius:0.5rem;font-size:0.82rem;">
                                <i class="bi bi-exclamation-circle me-1"></i> {{ m }}
                            </div>
                            {% endfor %}
                        </div>
                        {% endif %}
                        <form method="POST" novalidate>
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label small fw-semibold" style="font-size:0.75rem;color:var(--slate-600);">Cedula</label>
                                <div class="input-group">
                                    <span class="input-group-text" style="background:var(--slate-50);border-right:none;"><i class="bi bi-person" style="color:var(--slate-400);"></i></span>
                                    {{ form.cedula }}
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-semibold" style="font-size:0.75rem;color:var(--slate-600);">Fecha de Expedicion</label>
                                <div class="input-group">
                                    <span class="input-group-text" style="background:var(--slate-50);border-right:none;"><i class="bi bi-calendar3" style="color:var(--slate-400);"></i></span>
                                    {{ form.fecha_expedicion }}
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold" style="border-radius:0.5rem;font-size:0.85rem;">
                                <i class="bi bi-box-arrow-in-right"></i> Ingresar
                            </button>
                        </form>
                    </div>
                </div>
                <p class="text-center text-muted mt-3" style="font-size:0.7rem;">Kairos v4.2.4</p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
