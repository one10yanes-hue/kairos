{% extends "base.html" %}
{% load static %}

{% block content_auth %}
<div class="min-vh-100 d-flex align-items-center justify-content-center bg-white">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card shadow-sm rounded-4">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <i class="bi bi-graph-up-arrow" style="font-size: 2.5rem; color: var(--accent);"></i>
                            <h3 class="fw-bold mt-2" style="font-family:'Nunito',sans-serif;font-weight:900;letter-spacing:1px;color:var(--slate-800);">KAIROS</h3>
                            <p class="text-muted small">Sistema de Productividad</p>
                        </div>
                        {% if messages %}
                        <div class="mb-3">
                            {% for m in messages %}
                            <div class="alert alert-danger py-2 px-3 small" style="border-radius:0.5rem;font-size:0.82rem;">
                                <i class="bi bi-exclamation-circle me-1"></i> {{ m }}
                            </div>
                            {% endfor %}
                        </div>
                        {% endif %}
                        <form method="POST" novalidate>
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label small fw-semibold">Cedula</label>
                                {{ form.cedula }}
                            </div>
                            <div class="mb-4">
                                <label class="form-label small fw-semibold">Fecha de Expedicion</label>
                                {{ form.fecha_expedicion }}
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
                                <i class="bi bi-box-arrow-in-right"></i> Ingresar
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
