{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sesion Expirada - Kairos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="{% static 'css/main.css' %}" rel="stylesheet">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100" style="background:var(--slate-50);">
    <div class="text-center px-4" style="max-width:420px;">
        <i class="bi bi-shield-exclamation" style="font-size:3rem;color:#8a6100;"></i>
        <h4 class="fw-bold mt-3" style="color:var(--slate-800);">Sesion expirada</h4>
        <p class="text-muted small mt-2">Tu sesion vencio o la pagina estuvo abierta mucho tiempo. Recarga la pagina para obtener un nuevo token de seguridad.</p>
        <div class="d-flex gap-2 justify-content-center mt-3">
            <button class="btn btn-primary btn-sm px-4" onclick="location.reload()"><i class="bi bi-arrow-clockwise"></i> Recargar</button>
            <a href="/" class="btn btn-outline-secondary btn-sm px-4">Inicio</a>
        </div>
    </div>
</body>
</html>
