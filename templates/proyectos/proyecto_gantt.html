{% extends "base.html" %}{% load static %}
{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css" rel="stylesheet">
<link href="{% static 'css/linea_tiempo.css' %}" rel="stylesheet">
{% endblock %}
{% block content %}
<div class="container-fluid mt-3 tl-wrap">
  <div class="tl-toolbar card">
    <div class="card-body">
      <div class="d-flex flex-wrap align-items-center justify-content-between gap-2">
        <div class="d-flex align-items-center gap-2">
          <div class="tl-title-icon">
            <i class="bi bi-bar-chart-steps"></i>
          </div>
          <div>
            <h5 class="mb-0 fw-bold">{{ proyecto.codigo }} &middot; Gantt</h5>
            <div class="tl-subtitle">{{ proyecto.nombre }}</div>
          </div>
        </div>
        <div class="tl-controls d-flex flex-wrap align-items-center gap-1">
          <button class="btn btn-sm btn-outline-secondary" style="font-size:0.65rem;" onclick="irAFecha('{{ hoy }}')">Hoy</button>
          <button class="btn btn-sm btn-outline-secondary" style="font-size:0.65rem;" onclick="irARango('{{ semana_inicio }}','{{ semana_fin }}')">Semana</button>
          <button class="btn btn-sm btn-outline-secondary" style="font-size:0.65rem;" onclick="irARango('{{ mes_inicio }}','{{ mes_fin|date:'Y-m-d' }}')">Mes</button>
          <span class="text-muted" style="font-size:0.6rem;">|</span>
          <button class="btn btn-sm btn-outline-secondary" style="font-size:0.68rem;" onclick="timeline.fit({animation:{duration:300}})"><i class="bi bi-arrows-angle-expand"></i></button>
          <button class="btn btn-sm btn-outline-secondary" style="font-size:0.68rem;" onclick="timeline.zoomIn(0.5)"><i class="bi bi-zoom-in"></i></button>
          <button class="btn btn-sm btn-outline-secondary" style="font-size:0.68rem;" onclick="timeline.zoomOut(0.5)"><i class="bi bi-zoom-out"></i></button>
          <span class="text-muted" style="font-size:0.6rem;">|</span>
          <button class="btn btn-sm btn-outline-secondary" style="font-size:0.65rem;" onclick="exportarPNG()"><i class="bi bi-download"></i> PNG</button>
          <a href="{% url 'proyectos:proyecto_detail' proyecto.pk %}" class="btn btn-sm btn-outline-secondary" style="font-size:0.65rem;">Dashboard</a>
        </div>
      </div>
      <div class="tl-legend">
        <div class="tl-legend-item"><div class="tl-legend-box gantt-plan"></div><span>Planificado</span></div>
        <div class="tl-legend-item"><div class="tl-legend-box gantt-activo"></div><span>En Curso</span></div>
        <div class="tl-legend-item"><div class="tl-legend-box gantt-fin"></div><span>Finalizado</span></div>
        <div class="tl-legend-item ms-auto"><small class="text-muted" style="font-size:0.6rem;">{{ grupos|length }} grupos &middot; {{ items|length }} barras &middot; {{ tareas_total }} tareas</small></div>
      </div>
    </div>
  </div>
  <div class="tl-body">
    <div id="gantt" class="tl-vis"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
var container = document.getElementById('gantt');
var groups = new vis.DataSet({{ grupos|safe }});
var items = new vis.DataSet({{ items|safe }});
var options = {
    editable: false, stack: true, showCurrentTime: true, locale: 'es',
    zoomMin: 86400000, zoomMax: 315360000000, verticalScroll: true,
    margin: { item: 8, axis: 0 },
    tooltip: { followMouse: true, overflowMethod: 'cap' },
    template: function(item, element, data) {
        if (!data || !data.content) return '';
        return '<div style="padding:1px 6px;font-size:0.6rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + data.content + '</div>';
    }
};
var timeline = new vis.Timeline(container, items, groups, options);
setTimeout(function () { timeline.fit({ animation: { duration: 300 } }); }, 300);

// Tooltip personalizado oscuro (mismo patron que linea_tiempo.js)
var ganttTip = document.createElement('div');
ganttTip.style.cssText = 'position:fixed;display:none;background:#1e293b;color:#fff;padding:8px 12px;border-radius:6px;font-size:0.72rem;z-index:9999;pointer-events:none;max-width:320px;line-height:1.4;box-shadow:0 4px 16px rgba(0,0,0,0.18);';
document.body.appendChild(ganttTip);

timeline.on('itemover', function(props) {
    var item = items.get(props.item);
    if (!item || !item.tooltip) { ganttTip.style.display = 'none'; return; }
    var parts = item.tooltip.split('|');
    if (parts.length < 2) { ganttTip.style.display = 'none'; return; }
    ganttTip.innerHTML = '<div style="font-weight:600;font-size:0.78rem;margin-bottom:4px;color:#f1f5f9;">' + parts[0] + '</div>' +
        parts.slice(1).map(function(p){ return '<div style="font-size:0.65rem;opacity:0.85;margin-top:1px;">' + p + '</div>'; }).join('');
    ganttTip.style.display = 'block';
    ganttTip.style.left = (props.event.clientX + 14) + 'px';
    ganttTip.style.top = (props.event.clientY - 8) + 'px';
});
timeline.on('itemout', function(){ ganttTip.style.display = 'none'; });
timeline.on('show', function(){ ganttTip.style.display = 'none'; });

function irAFecha(f) { timeline.setWindow(new Date(f), new Date(f + 'T23:59:59'), {animation:{duration:300}}); }
function irARango(ini, fin) { timeline.setWindow(new Date(ini), new Date(fin + 'T23:59:59'), {animation:{duration:300}}); }

function exportarPNG() {
    if (typeof html2canvas === 'undefined') { alert('Cargando libreria de exportacion...'); return; }
    var el = document.querySelector('.tl-body');
    html2canvas(el, { backgroundColor: '#ffffff', scale: 2 }).then(function(canvas) {
        var link = document.createElement('a');
        link.download = 'gantt-{{ proyecto.codigo }}.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
}
</script>
{% endblock %}
