{% extends "base.html" %}{% block content %}
<div class="container-fluid mt-3">
    <div class="d-flex justify-content-between align-items-center mb-2">
        <h5 class="fw-bold"><i class="bi bi-bar-chart-steps"></i> Gantt · {{ proyecto.codigo }}</h5>
        <div class="d-flex gap-2">
            <a href="{% url 'proyectos:proyecto_detail' proyecto.pk %}" class="btn btn-sm btn-outline-secondary" style="font-size:0.75rem;">Dashboard</a>
        </div>
    </div>

    <div class="row g-2 mb-3">
        <div class="col"><div class="card shadow-sm"><div class="card-body text-center py-2"><div class="fw-bold" style="font-size:1rem;color:#0ea5e9;">{{ grupos|length }}</div><small class="text-muted" style="font-size:0.6rem;">Sprints</small></div></div></div>
        <div class="col"><div class="card shadow-sm"><div class="card-body text-center py-2"><div class="fw-bold" style="font-size:1rem;color:#22c55e;">{{ tareas_total }}</div><small class="text-muted" style="font-size:0.6rem;">Tareas</small></div></div></div>
        <div class="col"><div class="card shadow-sm"><div class="card-body text-center py-2"><div class="fw-bold" style="font-size:1rem;color:#ca8a04;">{{ proyecto.avance }}%</div><small class="text-muted" style="font-size:0.6rem;">Avance</small></div></div></div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-2">
            <div id="gantt" style="height:500px;"></div>
        </div>
    </div>
</div>

<link href="https://cdn.jsdelivr.net/npm/vis-timeline@7.7.3/styles/vis-timeline-graph2d.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/vis-timeline@7.7.3/standalone/umd/vis-timeline-graph2d.min.js"></script>
<script>
var container = document.getElementById('gantt');
var groups = new vis.DataSet({{ grupos|safe }});
var items = new vis.DataSet({{ items|safe }});
var options = {
    editable: false,
    stack: true,
    showCurrentTime: true,
    locale: 'es',
    zoomMin: 86400000,
    zoomMax: 315360000000,
    tooltip: { followMouse: true, overflowMethod: 'cap' },
    verticalScroll: true,
};
var timeline = new vis.Timeline(container, items, groups, options);
setTimeout(function () { timeline.fit({ animation: { duration: 300 } }); }, 200);
</script>
{% endblock %}
