{% extends "base.html" %}{% block content %}
<div class="container-fluid mt-3">
    <h5 class="fw-bold mb-3"><i class="bi {% if editando %}bi-pencil{% else %}bi-plus-circle{% endif %}" style="color:var(--accent);"></i> {% if editando %}Editar{% else %}Nuevo{% endif %} Proyecto</h5>
    <div class="card shadow-sm">
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Nombre <span class="text-danger">*</span></label>
                        <input type="text" name="nombre" class="form-control" value="{{ proyecto.nombre|default:'' }}" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">SubAreas</label>
                        <input type="text" class="form-control form-control-sm mb-2" id="filtroSubareas" placeholder="Filtrar subareas..." onkeyup="filtrarSubareas()" style="font-size:0.8rem;">
                        <div class="border rounded p-2" id="subareasContainer" style="max-height:130px;overflow-y:auto;">
                            {% for s in subareas %}
                            <label class="d-flex align-items-center gap-2 px-1" style="cursor:pointer;font-size:0.75rem;border-bottom:1px solid #f1f5f9;" data-nombre="{{ s.nombre }} {{ s.area.nombre }}">
                                <input type="checkbox" name="subareas" value="{{ s.pk }}" class="form-check-input mt-0" onchange="filtrarUsuariosSubareas()">
                                <span>{{ s.nombre }} <small class="text-muted">({{ s.area.nombre }})</small></span>
                            </label>
                            {% endfor %}
                        </div>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Manager <span class="text-danger">*</span></label>
                        <input type="text" class="form-control form-control-sm mb-2" id="filtroManager" placeholder="Filtrar usuarios..." onkeyup="filtrarManagers()" style="font-size:0.8rem;">
                        <select name="manager" id="managerSelect" class="form-select" required style="font-size:0.8rem;">
                            <option value="">Seleccione...</option>
                            {% for u in usuarios %}
                            <option value="{{ u.pk }}" data-subareas="{{ u.subareas.all|join:',' }}">{{ u.get_full_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    {% if editando %}
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Estado</label>
                        <select name="estado" class="form-select">
                            <option value="activo" {% if proyecto.estado == 'activo' %}selected{% endif %}>Activo</option>
                            <option value="pausado" {% if proyecto.estado == 'pausado' %}selected{% endif %}>Pausado</option>
                            <option value="finalizado" {% if proyecto.estado == 'finalizado' %}selected{% endif %}>Finalizado</option>
                            <option value="cancelado" {% if proyecto.estado == 'cancelado' %}selected{% endif %}>Cancelado</option>
                        </select>
                    </div>
                    {% endif %}
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Fecha Inicio</label>
                        <input type="date" name="fecha_inicio" class="form-control" value="{{ proyecto.fecha_inicio|date:'Y-m-d'|default:'' }}">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label small fw-semibold">Fecha Fin Estimada</label>
                        <input type="date" name="fecha_fin_estimada" class="form-control" value="{{ proyecto.fecha_fin_estimada|date:'Y-m-d'|default:'' }}">
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-semibold">Descripción</label>
                        <textarea name="descripcion" class="form-control" rows="2">{{ proyecto.descripcion|default:'' }}</textarea>
                    </div>
                    <div class="col-12">
                        <label class="form-label small fw-semibold">Objetivo</label>
                        <textarea name="objetivo" class="form-control" rows="2">{{ proyecto.objetivo|default:'' }}</textarea>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-3">
                    <button type="submit" class="btn btn-primary btn-sm">Guardar</button>
                    <a href="{% if editando %}{% url 'proyectos:proyecto_detail' proyecto.pk %}{% else %}{% url 'proyectos:proyecto_list' %}{% endif %}" class="btn btn-outline-secondary btn-sm">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function filtrarSubareas() {
    var f = document.getElementById('filtroSubareas').value.toLowerCase();
    document.querySelectorAll('#subareasContainer label').forEach(function(l) {
        l.style.display = l.textContent.toLowerCase().includes(f) ? '' : 'none';
    });
}

function filtrarManagers() {
    var f = document.getElementById('filtroManager').value.toLowerCase();
    var sel = document.getElementById('managerSelect');
    Array.from(sel.options).forEach(function(o) {
        if (o.value === '') return;
        o.style.display = o.text.toLowerCase().includes(f) ? '' : 'none';
    });
}
</script>
{% endblock %}
