{% extends "base.html" %}{% block content %}
<div class="container-fluid mt-3">
    <h5 class="fw-bold mb-3">Burndown &middot; Sprint {{ sprint.numero }}: {{ sprint.nombre }}</h5>
    <div class="row g-2 mb-3">
        <div class="col"><div class="card shadow-sm"><div class="card-body text-center py-2"><div class="fw-bold" style="font-size:1rem;color:#0ea5e9;">{{ sprint.puntos_comprometidos }}</div><small class="text-muted" style="font-size:0.6rem;">Pts totales</small></div></div></div>
        <div class="col"><div class="card shadow-sm"><div class="card-body text-center py-2"><div class="fw-bold" style="font-size:1rem;color:#22c55e;">{{ sprint.velocidad }}</div><small class="text-muted" style="font-size:0.6rem;">Pts completados</small></div></div></div>
        <div class="col"><div class="card shadow-sm"><div class="card-body text-center py-2"><div class="fw-bold" style="font-size:1rem;color:#f59e0b;">{{ dias|length }}</div><small class="text-muted" style="font-size:0.6rem;">D&iacute;as del sprint</small></div></div></div>
    </div>
    <div class="card shadow-sm"><div class="card-body p-4">
        <canvas id="burndownChart" style="max-height:400px;"></canvas>
    </div></div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    var ctx = document.getElementById('burndownChart');
    if (!ctx) return;
    ctx = ctx.getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: {{ dias|safe }},
            datasets: [
                { label: 'Ideal', data: {{ ideal|safe }}, borderColor: '#94a3b8', borderDash: [5,5], fill: false, tension: 0.1, pointRadius: 3 },
                { label: 'Real', data: {{ real|safe }}, borderColor: '#3b82f6', backgroundColor: 'rgba(59,130,246,0.1)', fill: true, tension: 0.1, pointRadius: 4 }
            ]
        },
        options: {
            responsive: true,
            interaction: { intersect: false, mode: 'index' },
            plugins: { legend: { labels: { font: { size: 11 } } } },
            scales: {
                y: { beginAtZero: true, title: { display: true, text: 'Story Points' }, max: {{ pts_inicio }} + 2 },
                x: { title: { display: true, text: 'Dias' } }
            }
        }
    });
});
</script>
{% endblock %}
