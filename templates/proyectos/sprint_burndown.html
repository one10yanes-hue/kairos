{% extends "base.html" %}{% block content %}
<div class="container-fluid mt-3">
    <h5 class="fw-bold mb-3">Burndown &middot; Sprint {{ sprint.numero }}: {{ sprint.nombre }}</h5>
    <div class="row g-2 mb-3">
        <div class="col"><div class="card shadow-sm"><div class="card-body text-center py-2"><div class="fw-bold" style="font-size:1rem;color:#0ea5e9;">{{ sprint.puntos_comprometidos }}</div><small class="text-muted" style="font-size:0.6rem;">Pts totales</small></div></div></div>
        <div class="col"><div class="card shadow-sm"><div class="card-body text-center py-2"><div class="fw-bold" style="font-size:1rem;color:#22c55e;">{{ sprint.velocidad }}</div><small class="text-muted" style="font-size:0.6rem;">Pts completados</small></div></div></div>
        <div class="col"><div class="card shadow-sm"><div class="card-body text-center py-2"><div class="fw-bold" style="font-size:1rem;color:#f59e0b;">{{ dias|length }}</div><small class="text-muted" style="font-size:0.6rem;">D&iacute;as del sprint</small></div></div></div>
    </div>
    <div class="card shadow-sm"><div class="card-body p-4">
        <canvas id="burndownChart" style="max-height:450px;"></canvas>
    </div></div>
</div>
{% endblock %}
{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    var ctx = document.getElementById('burndownChart');
    if (!ctx) return;
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: {{ dias|safe }},
            datasets: [
                { label: 'Ideal', data: {{ ideal|safe }}, borderColor: '#cbd5e1', borderWidth:2, borderDash: [6,4], fill: false, tension: 0.3, pointRadius:0, pointHoverRadius:4, pointHoverBackgroundColor:'#cbd5e1' },
                { label: 'Real', data: {{ real|safe }}, borderColor: '#3b82f6', borderWidth:2.5, backgroundColor: 'rgba(59,130,246,0.08)', fill: true, tension: 0.3, pointRadius:5, pointBackgroundColor:'#fff', pointBorderColor:'#3b82f6', pointBorderWidth:2, pointHoverRadius:7 }
            ]
        },
        options: {
            responsive: true, maintainAspectRatio: false,
            interaction: { intersect: false, mode: 'index' },
            plugins: {
                legend: { position:'bottom', labels: { font:{ size:10 }, boxWidth:12, boxHeight:2, usePointStyle:true, padding:16, color:'#64748b' } },
                tooltip: { backgroundColor:'#1e293b', titleFont:{ size:11 }, bodyFont:{ size:10 }, padding:10, cornerRadius:6 }
            },
            scales: {
                y: { beginAtZero:true, max:{{ pts_inicio }}+2, title:{ display:true, text:'Story Points', color:'#94a3b8', font:{ size:9 } }, ticks:{ stepSize:{% if pts_inicio > 10 %}5{% else %}2{% endif %}, font:{ size:9 }, color:'#94a3b8' }, grid:{ display:false } },
                x: { title:{ display:true, text:'Dias', color:'#94a3b8', font:{ size:9 } }, ticks:{ font:{ size:9 }, color:'#64748b' }, grid:{ display:false } }
            }
        }
    });
});
</script>
{% endblock %}
