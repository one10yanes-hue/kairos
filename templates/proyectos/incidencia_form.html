{% extends "base.html" %}{% block content %}
<div class="container-fluid mt-3">
    <h5 class="fw-bold mb-3"><i class="bi bi-bug"></i> Reportar Incidencia · {{ proyecto.codigo }}</h5>
    <div class="card shadow-sm"><div class="card-body p-4">
        <form method="POST">{% csrf_token %}
            <div class="row g-3">
                <div class="col-12"><label class="form-label small fw-semibold">Título <span class="text-danger">*</span></label><input type="text" name="titulo" class="form-control" required></div>
                <div class="col-12"><label class="form-label small fw-semibold">Descripción</label><textarea name="descripcion" class="form-control" rows="3"></textarea></div>
                <div class="col-md-4"><label class="form-label small fw-semibold">Tipo</label><select name="tipo" class="form-select"><option value="bug">Bug</option><option value="mejora">Mejora</option><option value="pregunta">Pregunta</option><option value="riesgo">Riesgo</option></select></div>
                <div class="col-md-4"><label class="form-label small fw-semibold">Severidad</label><select name="severidad" class="form-select"><option value="media">Media</option><option value="critica">Crítica</option><option value="alta">Alta</option><option value="baja">Baja</option></select></div>
                <div class="col-md-4"><label class="form-label small fw-semibold">Asignar a</label><select name="user_id" class="form-select"><option value="">Sin asignar</option>{% for m in miembros %}<option value="{{ m.user.pk }}">{{ m.user.get_full_name }}</option>{% endfor %}</select></div>
            </div>
            <div class="d-flex gap-2 mt-3"><button type="submit" class="btn btn-primary btn-sm">Reportar</button><a href="{% url 'proyectos:incidencia_list' proyecto.pk %}" class="btn btn-outline-secondary btn-sm">Cancelar</a></div>
        </form>
    </div></div>
</div>
{% endblock %}
