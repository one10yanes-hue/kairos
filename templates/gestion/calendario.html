{% extends "base.html" %}{% load static %}
{% block extra_css %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet">
<style>
#fcCalendar { max-width:100%; }
.fc-toolbar-title { font-size:0.95rem !important; font-weight:600 !important; }
.fc-button { font-size:0.7rem !important; padding:0.2rem 0.45rem !important; text-transform:capitalize !important; }
.fc-button-primary { background-color:var(--accent) !important; border-color:var(--accent) !important; }
.fc-button-primary:not(:disabled):active,
.fc-button-primary:not(:disabled).fc-button-active { background-color:var(--accent-dark) !important; border-color:var(--accent-dark) !important; }
.fc .fc-button-primary:disabled { opacity:0.5 !important; }
.fc-day-today { background:var(--accent-light) !important; }
.fc-event { border-radius:3px !important; font-size:0.62rem !important; padding:1px 3px !important; cursor:pointer !important; border:none !important; }
.cal-legend { display:flex;gap:0.75rem;flex-wrap:wrap;font-size:0.65rem;padding:0.4rem 0.6rem;border-top:1px solid var(--slate-200); }
.cal-legend span { display:flex;align-items:center;gap:0.2rem; }
.cal-dot { width:8px;height:8px;border-radius:50%;display:inline-block; }
.fc-scroller { overflow:visible !important; }
@media (max-width:768px) { .fc-toolbar { flex-direction:column !important; gap:4px !important; } }
</style>
{% endblock %}
{% block content %}
<div class="container-fluid mt-3">
    <div class="card shadow-sm">
        <div class="card-body p-2">
            <div id="fcCalendar"></div>
        </div>
        <div class="cal-legend">
            <span><span class="cal-dot" style="background:#e8eaf0;"></span> Pendiente</span>
            <span><span class="cal-dot" style="background:#d4f5e0;"></span> En Curso</span>
            <span><span class="cal-dot" style="background:#fef9e7;border:1px solid #e2d8c0;"></span> Pausada</span>
            <span><span class="cal-dot" style="background:#e2f0e8;"></span> Finalizada</span>
        </div>
    </div>
</div>
{{ events_json|json_script:"fc-events" }}
{% endblock %}
{% block extra_js %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales/es.global.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
    var events = JSON.parse(document.getElementById('fc-events').textContent);
    var cal = new FullCalendar.Calendar(document.getElementById('fcCalendar'), {
        initialView: '{{ vista }}',
        initialDate: '{{ year }}-{{ month|stringformat:"02d" }}-01',
        locale: 'es',
        headerToolbar: { left:'prev,next today', center:'title', right:'dayGridMonth,timeGridWeek' },
        buttonText: { today:'Hoy', dayGridMonth:'Mes', timeGridWeek:'Semana' },
        events: events,
        eventDidMount: function(info) {
            var e = info.event;
            var ep = e.extendedProps;
            var tooltipContent = '<b>' + e.title + '</b><br><small>' + ep.tipo + ' &middot; ' + ep.estado;
            if (ep.tiempo && ep.tiempo !== '00:00:00') tooltipContent += ' &middot; ' + ep.tiempo;
            tooltipContent += '</small>';
            new bootstrap.Tooltip(info.el, { title: tooltipContent, html: true, placement:'top', container:'body' });
        },
        eventClick: function(info) {
            var id = info.event.id;
            if (id && !id.startsWith('v')) {
                window.location.href = '/usuario/actividad/' + id + '/detalle/';
            }
        },
        height: 'auto',
        dayMaxEvents: 3,
        moreLinkClick: 'popover',
    });
    cal.render();
});
</script>
{% endblock %}
